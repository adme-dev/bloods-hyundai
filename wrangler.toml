# Cloudflare Pages configuration for Sale Hyundai Nuxt
# Documentation: https://developers.cloudflare.com/pages/platform/wrangler-configuration/
#
# IMPORTANT: Configure build settings in Cloudflare Dashboard:
# - Build command: npm run build
# - Build output directory: dist
#
# To deploy manually:
# npm run build:cloudflare && npx wrangler pages deploy dist

name = "sale-hyundai"

# Output directory for Cloudflare Pages (Nuxt cloudflare-pages preset outputs to dist)
pages_build_output_dir = "dist"

# Compatibility settings for Node.js APIs (buffer, crypto, path, etc.)
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]
