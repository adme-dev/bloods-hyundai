# Cloudflare Pages configuration for Sale Hyundai Nuxt
# Documentation: https://developers.cloudflare.com/pages/platform/wrangler-configuration/

name = "sale-hyundai"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Pages-specific configuration
pages_build_output_dir = ".output/public"

# Build settings
[build]
command = "npm run build:cloudflare"

# Environment variables for production
[vars]
NODE_ENV = "production"

# KV Namespace bindings (if needed in future)
# [[kv_namespaces]]
# binding = "MY_KV_NAMESPACE"
# id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# R2 bucket bindings (already using for dealer assets)
# [[r2_buckets]]
# binding = "DEALER_ASSETS"
# bucket_name = "dealer-assets"

# D1 database bindings (if migrating from NEON)
# [[d1_databases]]
# binding = "DB"
# database_name = "sale-hyundai"
# database_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
