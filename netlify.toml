# Netlify configuration for Nuxt 4

[build]
  command = "npm run build"
  # Nuxt 4 SSR output with the Netlify preset
  publish = "dist"

[build.environment]
  NODE_VERSION = "20.19.0"
  NODE_OPTIONS = "--max-old-space-size=4096"

# Functions config
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Scheduled functions (e.g. metrics-sync-cron) declare their cron schedule
# inline via `export const config = { schedule }` in the .mts file itself —
# the canonical mechanism for TypeScript/JavaScript functions per Netlify's
# docs (https://docs.netlify.com/functions/scheduled-functions/). A
# `[functions."<name>"] schedule = "..."` block here is documented as an
# ALTERNATIVE for those functions, not a required supplement, and Netlify's
# docs do not define precedence if both are set — so we intentionally do not
# duplicate the schedule here to avoid two sources of truth drifting apart.

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Static assets caching
[[headers]]
  for = "/_nuxt/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Content-Type = "image/svg+xml; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Netlify-CDN-Cache-Control = "public, max-age=300, stale-while-revalidate=3600"
    CDN-Cache-Control = "public, max-age=300, stale-while-revalidate=3600"

# No cache for HTML
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# JSON short cache
[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Netlify Image CDN - Allow remote images from these domains
# Required for NuxtImage to work with external image sources
[images]
  remote_images = [
    "https://hyundaioem.b-cdn.net/.*",
    "https://salehyundai.com.au/.*",
    "https://driveAgentMedia.b-cdn.net/.*",
    "https://driveagent.b-cdn.net/.*",
    "https://www.hyundai.com/.*",
    "https://carsales.pxcrush.net/.*",
    # Media library / promo assets on Cloudflare R2. NuxtImg routes through
    # the Netlify Image CDN in production, which 400s any host not listed here.
    "https://pub-2b8337ab6f87485088d38cc01ca2ae80.r2.dev/.*"
  ]
