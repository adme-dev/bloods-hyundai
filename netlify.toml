# Netlify configuration for Nuxt 4 with @netlify/nuxt module
# 
# IMPORTANT: The @netlify/nuxt module handles deployment automatically.
# It creates .netlify/functions-internal/ for serverless functions.
# 
# If you see "Deploy directory does not exist" errors, check:
# 1. Netlify Dashboard → Site configuration → Build settings → Clear "Publish directory"
# 2. The module should auto-configure everything

[build]
  # Delete cached node_modules and reinstall fresh to get correct Linux binaries
  # This fixes oxc-parser native binding issues
  # Note: Using npm install (not npm ci) because package-lock.json is gitignored
  # to avoid cross-platform native binding issues (oxc-parser, esbuild)
  command = "rm -rf node_modules && npm install && npm run build"
  # Nitro netlify preset outputs static assets to dist/
  # Functions go to .netlify/functions-internal/ (auto-detected)
  publish = "dist"
  # Ignore files that don't affect the build to skip unnecessary deploys
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ':!*.md' ':!memory-bank/' ':!.github/'"

# Skip Netlify's asset processing - Nuxt/Vite already handles bundling/minification
[build.processing]
  skip_processing = true

[build.environment]
  NODE_VERSION = "20"
  # Mark as CI environment for optimizations
  CI = "true"
  # Force fresh npm install to get correct platform-specific binaries
  NPM_FLAGS = "--prefer-offline=false"
  # NODE_OPTIONS is set in package.json build script, not here (avoids conflicts)
  # Disable source maps in production to speed up build
  GENERATE_SOURCEMAP = "false"
  # Disable Vite's detailed logging to reduce I/O overhead
  VITE_LOG_LEVEL = "warn"
  # Skip type checking during build
  NUXT_TYPESCRIPT_TYPECHECK = "false"
  # Silence SCSS deprecation warnings (reduces console I/O)
  SASS_SILENCE_DEPRECATION_WARNINGS = "true"

# Functions config
[functions]
  node_bundler = "esbuild"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# No cache for HTML pages (SPA/SSG entry points)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# No cache for root index (Nuxt SSG)
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Nuxt build manifest - MUST not be cached to detect new deployments
[[headers]]
  for = "/_nuxt/builds/latest.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Nuxt build meta files - immutable (unique per build)
[[headers]]
  for = "/_nuxt/builds/meta/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Static assets caching (JS/CSS with content hashes)
[[headers]]
  for = "/_nuxt/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# JSON short cache (API responses, data files)
[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Netlify Image CDN - Allow remote images from these domains
# Required for NuxtImage to work with external image sources
[images]
  remote_images = [
    "https://hyundaioem.b-cdn.net/.*",
    "https://salehyundai.com.au/.*",
    "https://driveAgentMedia.b-cdn.net/.*",
    "https://driveagent.b-cdn.net/.*",
    "https://www.hyundai.com/.*",
    "https://carsales.pxcrush.net/.*"
  ]








