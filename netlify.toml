# Netlify configuration for Nuxt 4
# IMPORTANT: This configuration prevents CSS/JS 404 errors during deployments
# Uses @netlify/nuxt module for proper platform integration

[build]
  command = "npm run build"
  # Nuxt outputs to dist/ for static files - Netlify auto-detects functions from .output/server
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Increase memory for large builds
  NODE_OPTIONS = "--max-old-space-size=8192"
  # Disable source maps in production to speed up build
  GENERATE_SOURCEMAP = "false"
  # Tell Nuxt we're on Netlify for conditional optimizations
  NETLIFY = "true"
  # Reduce Vite parallelism on CI for more stable builds
  VITE_CJS_IGNORE_WARNING = "true"

# CRITICAL: Skip ALL post-processing to prevent Netlify from modifying Nuxt's hashed assets
# This is the most common cause of CSS/JS 404 errors after deployment
[build.processing]
  skip_processing = true

# Functions config
[functions]
  node_bundler = "esbuild"
  # Include all files from server output
  included_files = [".output/server/**"]

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Static assets caching with proper MIME types
# CRITICAL: Ensure CSS/JS files have correct Content-Type headers
[[headers]]
  for = "/_nuxt/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_nuxt/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_nuxt/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# No cache for HTML
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# JSON short cache
[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Netlify Image CDN - Allow remote images from these domains
# Required for NuxtImage to work with external image sources
[images]
  remote_images = [
    "https://hyundaioem.b-cdn.net/.*",
    "https://salehyundai.com.au/.*",
    "https://driveAgentMedia.b-cdn.net/.*",
    "https://driveagent.b-cdn.net/.*",
    "https://www.hyundai.com/.*",
    "https://carsales.pxcrush.net/.*"
  ]
