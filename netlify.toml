# Netlify configuration for Nuxt 4

[build]
  command = "npm run build"
  # Nuxt 4 SSR output with the Netlify preset
  publish = "dist"

[build.environment]
  NODE_VERSION = "20.19.0"
  NODE_OPTIONS = "--max-old-space-size=4096"

# Functions config
[functions]
  node_bundler = "esbuild"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Static assets caching
[[headers]]
  for = "/_nuxt/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Netlify-CDN-Cache-Control = "public, max-age=300, stale-while-revalidate=3600"
    CDN-Cache-Control = "public, max-age=300, stale-while-revalidate=3600"

# No cache for HTML
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# JSON short cache
[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Netlify Image CDN - Allow remote images from these domains
# Required for NuxtImage to work with external image sources
[images]
  remote_images = [
    "https://hyundaioem.b-cdn.net/.*",
    "https://salehyundai.com.au/.*",
    "https://driveAgentMedia.b-cdn.net/.*",
    "https://driveagent.b-cdn.net/.*",
    "https://www.hyundai.com/.*",
    "https://carsales.pxcrush.net/.*"
  ]




