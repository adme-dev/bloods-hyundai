# Netlify configuration for Nuxt 4

[build]
  command = "npm run build"
  publish = "dist"

# Skip Netlify's asset processing - Nuxt/Vite already handles bundling/minification
[build.processing]
  skip_processing = true

[build.environment]
  NODE_VERSION = "20"
  # Increase memory for large builds and enable concurrent workers
  NODE_OPTIONS = "--max-old-space-size=8192"
  # Disable source maps in production to speed up build
  GENERATE_SOURCEMAP = "false"
  # Enable Vite multi-threading
  VITE_BUILD_THREADS = "true"

# Functions config
[functions]
  node_bundler = "esbuild"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# No cache for HTML pages (SPA/SSG entry points)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# No cache for root index (Nuxt SSG)
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Nuxt build manifest - MUST not be cached to detect new deployments
[[headers]]
  for = "/_nuxt/builds/latest.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Nuxt build meta files - immutable (unique per build)
[[headers]]
  for = "/_nuxt/builds/meta/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Static assets caching (JS/CSS with content hashes)
[[headers]]
  for = "/_nuxt/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# JSON short cache (API responses, data files)
[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Netlify Image CDN - Allow remote images from these domains
# Required for NuxtImage to work with external image sources
[images]
  remote_images = [
    "https://hyundaioem.b-cdn.net/.*",
    "https://salehyundai.com.au/.*",
    "https://driveAgentMedia.b-cdn.net/.*",
    "https://driveagent.b-cdn.net/.*",
    "https://www.hyundai.com/.*",
    "https://carsales.pxcrush.net/.*"
  ]








